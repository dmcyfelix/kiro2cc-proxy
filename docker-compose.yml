services:
  kiro-rs:
    # 使用国内镜像
    image: ghcr.io/${IMAGE_OWNER:-tsinhzl}/kiro-rs-custom:${IMAGE_TAG:-latest}
    container_name: kiro-rs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - ./data:/app/config
    restart: unless-stopped
